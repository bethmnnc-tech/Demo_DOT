# CICD deployment controls for dev and prod 
# When a change is merged into main, dev will be triggered.  Jobs and Apps will be deployed to the dev workspace.
# When a change is merged into prod, prod will be triggered.  Jobs and Apps will be deployed to the prod workspace.
# Can also be triggered manually via workflow_dispatch.

name: 'DOT Bundle Deploy'

concurrency: 1

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
  push:
    branches:
      - main
      - prod

jobs:
  set-target:
    name: 'Determine Deploy Target'
    runs-on: ubuntu-latest
    outputs:
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "prod" ]; then
            echo "target=prod" >> "$GITHUB_OUTPUT"
          else
            echo "target=dev" >> "$GITHUB_OUTPUT"
          fi

  deploy-dev:
    name: 'Deploy to Dev'
    needs: set-target
    runs-on: ubuntu-latest
    if: needs.set-target.outputs.target == 'dev'
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target dev
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Adopt existing apps into bundle state
        run: |
          # Bind pre-existing apps so Terraform manages them
          # instead of trying to create duplicates.
          # Safe to re-run: silently succeeds if already bound.
          apps=("ncdot_camera_viewer:ncdot-camera-viewer"
                "dot_geospatial_app:dot-geospatial-app"
                "dot_ml_app:dot-ml-app"
                "mdot_camera_viewer:mdot-camera-viewer")
          for entry in "${apps[@]}"; do
            key="${entry%%:*}"
            name="${entry##*:}"
            echo "Binding app $key -> $name"
            databricks bundle deployment bind "$key" "$name" \
              --target dev --auto-approve 2>/dev/null || true
          done
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Adopt existing jobs into bundle state
        run: |
          # Bind pre-existing jobs so Terraform manages them
          # instead of trying to create duplicates.
          # Safe to re-run: silently succeeds if already bound.
          jobs=("dot_data_refresh:698168689162600"
                "dot_ml_training:849345797981086"
                "dot_monitoring_refresh:760901587269881"
                "dot_dbt_demo:748265400776645"
                "ncdot_camera_refresh:106420033938468"
                "ncdot_traffic_api:886469117376102"
                "mdot_camera_refresh:467654423494161")
          for entry in "${jobs[@]}"; do
            key="${entry%%:*}"
            id="${entry##*:}"
            echo "Binding job $key -> $id"
            databricks bundle deployment bind "$key" "$id" \
              --target dev --auto-approve 2>/dev/null || true
          done
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Deploy bundle
        run: databricks bundle deploy --target dev
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

  deploy-prod:
    name: 'Deploy to Prod'
    needs: set-target
    runs-on: ubuntu-latest
    if: needs.set-target.outputs.target == 'prod'
    steps:
      - uses: actions/checkout@v4

      - uses: databricks/setup-cli@main

      - name: Validate bundle
        run: databricks bundle validate --target prod
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Adopt existing apps into bundle state
        run: |
          apps=("ncdot_camera_viewer:ncdot-camera-viewer"
                "dot_geospatial_app:dot-geospatial-app"
                "dot_ml_app:dot-ml-app"
                "mdot_camera_viewer:mdot-camera-viewer")
          for entry in "${apps[@]}"; do
            key="${entry%%:*}"
            name="${entry##*:}"
            echo "Binding app $key -> $name"
            databricks bundle deployment bind "$key" "$name" \
              --target prod --auto-approve 2>/dev/null || true
          done
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Adopt existing jobs into bundle state
        run: |
          # Bind pre-existing jobs so Terraform manages them
          # instead of trying to create duplicates.
          # Safe to re-run: silently succeeds if already bound.
          jobs=("dot_data_refresh:538532425241714"
                "dot_ml_training:256886606780251"
                "dot_monitoring_refresh:1105142903086339"
                "dot_dbt_demo:827446265918"
                "ncdot_camera_refresh:216930953065575"
                "ncdot_traffic_api:68545249296904"
                "mdot_camera_refresh:830396752421058")
          for entry in "${jobs[@]}"; do
            key="${entry%%:*}"
            id="${entry##*:}"
            echo "Binding job $key -> $id"
            databricks bundle deployment bind "$key" "$id" \
              --target prod --auto-approve 2>/dev/null || true
          done
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}

      - name: Deploy bundle
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
