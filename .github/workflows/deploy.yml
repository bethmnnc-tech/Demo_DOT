# =============================================================================
# CD Pipeline — Deploy Databricks Asset Bundle on merge to main
# Runs after PRs are merged to deploy all resources to the target environment
# =============================================================================
name: CD — Deploy Bundle

on:
  push:
    branches: [main]
    paths:
      - "databricks.yml"
      - "Demo_Code/**"
      - "dbt_demo/**"
      - "dot_app/**"
      - ".github/workflows/**"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target dev

      - name: Deploy to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy --target dev --force

