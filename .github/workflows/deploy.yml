# =============================================================================
# CD Pipeline — Deploy Databricks Asset Bundle on merge to main / prod
# Dev deploys on push to main; Prod deploys on push to prod branch only
# =============================================================================
name: CD — Deploy Bundle

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main, prod]
    paths:
      - "databricks.yml"
      - "Demo_Code/**"
      - "dbt_demo/**"
      - "dot_app/**"
      - ".github/workflows/**"

permissions:
  contents: read
  id-token: write

jobs:
  deploy-dev:
    name: Deploy to Development
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle (dev)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target dev

      - name: Deploy to dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy --target dev --force

  deploy-prod:
    name: Deploy to Production
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/prod') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod')
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle (prod)
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target prod

      - name: Deploy to prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy --target prod --force
