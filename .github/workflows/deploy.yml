# =============================================================================
# CD Pipeline — Deploy Databricks Asset Bundle on merge to main
# Runs after PRs are merged to deploy all resources to the target environment
# =============================================================================
name: CD — Deploy Bundle

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod
  push:
    branches: [main]
    paths:
      - "databricks.yml"
      - "Demo_Code/**"
      - "dbt_demo/**"
      - "dot_app/**"
      - ".github/workflows/**"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.target || 'dev' }}
    runs-on: ubuntu-latest
    environment: ${{ (github.event.inputs.target || 'dev') == 'prod' && 'production' || '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle validate --target ${{ github.event.inputs.target || 'dev' }}

      - name: Deploy bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: databricks bundle deploy --target ${{ github.event.inputs.target || 'dev' }} --force

