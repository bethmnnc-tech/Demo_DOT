version: 2

sources:
  - name: dot_raw
    description: >
      Bronze-style source tables that dbt reads from. For the Databricks demo,
      these are intended to be external tables registered over the existing
      Delta locations written by the notebooks.
    database: "{{ var('databricks_catalog') if target.name == 'databricks' else var('onprem_database') }}"
    schema: "{{ var('databricks_bronze_schema') if target.name == 'databricks' else var('onprem_raw_schema') }}"
    tables:
      - name: traffic_incidents
        description: Raw traffic incident records from the Bronze layer.
        columns:
          - name: incident_id
            tests:
              - not_null
              - unique
          - name: incident_datetime
            tests:
              - not_null
          - name: state_code
            tests:
              - not_null
      - name: bridge_inspections
        description: Raw bridge inspection records from the Bronze layer.
        columns:
          - name: bridge_id
            tests:
              - not_null
              - unique
          - name: state_code
            tests:
              - not_null
          - name: year_built
            tests:
              - not_null

