# =============================================================================
# databricks.yml — Databricks Asset Bundle (DAB) Root Configuration
# DOT Transportation Data Platform
#
# Docs: https://docs.databricks.com/dev-tools/bundles/index.html
# CLI:  databricks bundle deploy --target dev
# =============================================================================

bundle:
  name: dot_transportation_platform

# ── Include modular resource definitions ──────────────────────────────────────
include:
  - deploy_variables/*.yml
  - deploy_jobs/*.yml
  - deploy_apps/*.yml
  - deploy_pipelines/*.yml

# ── Sync exclusions ───────────────────────────────────────────────────────────
# Exclude job-generated data files from bundle sync to prevent deployments
# from overwriting freshly refreshed camera data.
sync:
  exclude:
    - dot_app/ncdot-camera-viewer/data.json
    - dot_app/ncdot-camera-viewer/index.html
    - dot_app/mdot-camera-viewer/data.json
    - dot_app/mdot-camera-viewer/index.html

# ── Run-as identity ───────────────────────────────────────────────────────────
# To use a service principal, the deploying user must have the
# servicePrincipal/user role (granted via Account Console).
# For dev, we use the deploying user's identity instead.
# run_as:
#   service_principal_name: 1c0d9d65-d7ef-40db-8949-8af18dc3faf3

# # ── Permissions ───────────────────────────────────────────────────────────────
# permissions:
#   - user_name: beth.ramsey@trace3.com
#     level: CAN_MANAGE
#   - service_principal_name: 1c0d9d65-d7ef-40db-8949-8af18dc3faf3
#     level: CAN_MANAGE

# ── Workspace settings ────────────────────────────────────────────────────────
workspace:
  root_path: ~/.bundle/${bundle.name}/${bundle.target}
