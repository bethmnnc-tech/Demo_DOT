# =============================================================================
# Job 5: NCDOT Camera Data Refresh
# =============================================================================
resources:
  jobs:
    ncdot_camera_refresh:
      name: "[${bundle.target}] NCDOT Camera Data Refresh"
      schedule:
        quartz_cron_expression: ${var.ncdot_camera_cron}   # Daily at 6 AM ET
        timezone_id: ${var.schedule_timezone}
      email_notifications:
        on_failure:
          - beth.ramsey@trace3.com
      tags:
        project: dot_transportation
        layer: ncdot_cameras
      tasks:
        - task_key: refresh_ncdot_data
          notebook_task:
            notebook_path: ${workspace.file_path}/dot_app/ncdot-camera-viewer/refresh_ncdot_data.py
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 600
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies: []
