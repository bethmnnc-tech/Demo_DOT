# =============================================================================
# Job 7: MDOT Camera Data Refresh
# =============================================================================
resources:
  jobs:
    mdot_camera_refresh:
      name: "[${bundle.target}] MDOT Camera Data Refresh"
      schedule:
        quartz_cron_expression: ${var.mdot_camera_cron}   # Daily at 6 AM ET
        timezone_id: ${var.schedule_timezone}
      email_notifications:
        on_failure:
          - beth.ramsey@trace3.com
      tags:
        project: dot_transportation
        layer: mdot_cameras
      tasks:
        - task_key: refresh_mdot_data
          notebook_task:
            notebook_path: ${workspace.file_path}/dot_app/mdot-camera-viewer/refresh_mdot_data
            source: WORKSPACE
          environment_key: default
          timeout_seconds: 600
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies: []
